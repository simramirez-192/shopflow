server.port=${SERVER_PORT:8089}
spring.application.name=notification-service

# Base de datos - variables de entorno con fallback a Laragon (password vacío por defecto)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shopflow_notification?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.shopflow=DEBUG
